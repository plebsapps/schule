name: schule

services:
  db:
    image: postgres:17.10-bookworm
    container_name: schule-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB muss gesetzt sein}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER muss gesetzt sein}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss gesetzt sein}
    volumes:
      - schule-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - schule-internal

  web:
    build:
      context: .
    container_name: schule-web
    restart: unless-stopped
    init: true
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB muss gesetzt sein}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER muss gesetzt sein}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss gesetzt sein}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY muss gesetzt sein}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-schule.plebsapps.de}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-https://schule.plebsapps.de}
      DJANGO_SECURE_COOKIES: ${DJANGO_SECURE_COOKIES:-true}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-true}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-31536000}
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: ${DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS:-true}
      DJANGO_SECURE_HSTS_PRELOAD: ${DJANGO_SECURE_HSTS_PRELOAD:-false}
      DJANGO_SESSION_COOKIE_AGE: ${DJANGO_SESSION_COOKIE_AGE:-1800}
      DJANGO_LOGIN_FAILURE_LIMIT: ${DJANGO_LOGIN_FAILURE_LIMIT:-5}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
    command: ["sh", "-c", "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --access-logfile - --error-logfile -"]
    ports:
      - "127.0.0.1:8005:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - schule-internal

networks:
  schule-internal:
    name: schule-internal

volumes:
  schule-postgres-data:
    name: schule-postgres-data
