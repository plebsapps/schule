{% extends "base.html" %}

{% block title %}Anmelden | Zeugnisverwaltung{% endblock %}

{% block content %}
  <h2>Anmelden</h2>
  {% if form.errors %}<p>Benutzername oder Passwort ist ungültig.</p>{% endif %}
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Anmelden</button>
  </form>
{% endblock %}
